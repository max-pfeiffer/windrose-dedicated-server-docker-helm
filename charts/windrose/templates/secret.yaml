{{- range $i, $instance := .Values.instances }}
{{- if not $instance.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "windrose.fullname" $ }}-{{ $i }}
  labels:
    {{- include "windrose.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ include "windrose.fullname" $ }}-{{ $i }}
type: Opaque
stringData:
  PASSWORD: {{ $instance.password | quote }}
---
{{- end }}
{{- end }}
