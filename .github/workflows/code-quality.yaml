name: Code Quality

on:
  pull_request:
    paths:
      - .github/**
      - build/**
      - tests/**
      - uv.lock

jobs:
  code-quality:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Set up Python environment
        uses: ./.github/actions/setup-environment
      - name: Install dependencies
        run: |
          uv sync --frozen
      - name: Run ruff
        run: |
          uv run pre-commit run -a
