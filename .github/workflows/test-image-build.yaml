name: Test Image Build

on:
  pull_request:
    paths:
      - .github/actions/setup-environment/**
      - .github/workflows/test-image-build.yaml
      - .github/workflows/docker-image.yaml
      - .github/workflows/publish.yaml
      - .github/workflows/publish-manual.yaml
      - build/**
      - tests/conftest.py
      - tests/constants.py
      - tests/test_container.py
      - tests/test_image_build.py
      - poetry.lock

jobs:
  test-image-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Set up Python environment
        uses: ./.github/actions/setup-environment
      - name: Install dependencies
        run: |
          poetry install --with dev --no-interaction --no-root
      - name: Configure Podman to allow the insecure local test registry
        run: |
          sudo mkdir -p /etc/containers/registries.conf.d
          sudo tee /etc/containers/registries.conf.d/insecure-localhost.conf > /dev/null <<'EOF'
          [[registry]]
          location = "localhost:5000"
          insecure = true
          EOF
      - name: Run slow container image tests with pytest
        run: |
          poetry run pytest -m slow --cov build --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
